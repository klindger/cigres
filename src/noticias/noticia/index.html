<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notícia - CIGRES</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/inicio/noticias/style.css" rel="stylesheet">
</head>
<body>
  <div class="page-shell">
    <site-header active="noticias"></site-header>

    <main>
      <section class="news-detail-section" aria-label="Detalhe da notícia">
        <div class="container-wide">
          <article class="news-detail" id="newsDetail" data-news-source="/inicio/noticias/Data/noticias.json">
            <p class="news-empty">Carregando notícia...</p>
          </article>
        </div>
      </section>
    </main>

    <site-footer></site-footer>
  </div>

  <script src="/src/componentes/site-components.js" defer></script>
  <script>
    function getNewsId() {
      return new URLSearchParams(window.location.search).get("id");
    }

    function renderMissing(container) {
      container.innerHTML = "";

      const message = document.createElement("p");
      message.className = "news-empty";
      message.textContent = "Notícia não encontrada.";

      container.append(message);
    }

    function renderNewsDetail(container, news) {
      container.innerHTML = "";
      document.title = `${news.titulo} - CIGRES`;

      const backLink = document.createElement("a");
      backLink.className = "news-back-link";
      backLink.href = "/inicio/noticias";
      backLink.textContent = "Voltar para notícias";

      const meta = document.createElement("p");
      meta.className = "news-meta";
      meta.textContent = `Publicado em ${news.dataPublicacao}`;

      const title = document.createElement("h1");
      title.className = "news-detail-title";
      title.textContent = news.titulo;

      const image = document.createElement("img");
      image.className = "news-detail-image";
      image.src = news.imagem;
      image.alt = `Imagem da notícia: ${news.titulo}`;

      const body = document.createElement("div");
      body.className = "news-detail-body";

      const paragraphs = Array.isArray(news.conteudo) && news.conteudo.length > 0
        ? news.conteudo
        : [news.texto];

      paragraphs.forEach((paragraphText) => {
        const paragraph = document.createElement("p");
        paragraph.textContent = paragraphText;
        body.append(paragraph);
      });

      const textBlock = document.createElement("div");
      textBlock.className = "news-detail-text";
      textBlock.append(title, body);

      const detailLayout = document.createElement("div");
      detailLayout.className = "news-detail-layout";
      detailLayout.append(image, textBlock);

      container.append(backLink, meta, detailLayout);
    }

    async function loadNewsDetail() {
      const container = document.getElementById("newsDetail");
      const id = getNewsId();

      if (!id) {
        renderMissing(container);
        return;
      }

      try {
        const response = await fetch(container.dataset.newsSource, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Não foi possível carregar o JSON de notícias.");
        }

        const newsItems = await response.json();
        const news = Array.isArray(newsItems)
          ? newsItems.find((item) => item.id === id)
          : null;

        if (!news) {
          renderMissing(container);
          return;
        }

        renderNewsDetail(container, news);
      } catch (error) {
        console.error(error);
        renderMissing(container);
      }
    }

    loadNewsDetail();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
