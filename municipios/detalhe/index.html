<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Município | CIGRES</title>
  <meta name="description" content="Apresentação institucional dos municípios consorciados do CIGRES.">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/municipios/detalhe/style.css">

  <script defer src="/src/componentes/site-components.js"></script>
  <script defer src="/municipios/detalhe/script.js"></script>
</head>
<body>
  <div class="page-shell">
    <site-header active="municipios"></site-header>

    <main class="municipio-detalhe-page">
      <section class="municipio-detalhe-section">
        <div class="container-wide">
          <nav class="breadcrumb-nav" aria-label="Breadcrumb">
            <a href="/">Início</a>
            <i class="bi bi-chevron-right" aria-hidden="true"></i>
            <a href="/municipios/">Municípios</a>
            <i class="bi bi-chevron-right" aria-hidden="true"></i>
            <span id="breadcrumbMunicipio">Carregando...</span>
          </nav>

          <div class="hero-grid">
            <div class="detail-header">
              <span class="eyebrow">Município Consorciado</span>
              <h1 id="municipioNome">Carregando município...</h1>
              <p id="municipioDescricao"></p>

              <div class="hero-actions">
                <a id="siteMunicipioLink" class="btn-main disabled" href="#" target="_blank" rel="noopener noreferrer" aria-disabled="true">
                  <i class="bi bi-box-arrow-up-right"></i>
                  Site oficial do município
                </a>
              </div>
            </div>

            <aside class="identity-card">
              <span class="identity-accent" aria-hidden="true"></span>
              <div class="identity-frame">
                <img id="municipioMarca" class="identity-image" src="/src/logo.png" alt="Brasão do município">
              </div>
            </aside>
          </div>

          <div class="details-stack">
            <section class="detail-section">
              <span class="eyebrow">Prefeito</span>
              <h2>Prefeito</h2>
              <p id="prefeitoNome" class="role-label">-</p>

              <dl class="inline-meta-list">
                <div>
                  <dt>Vice-prefeito</dt>
                  <dd id="vicePrefeitoNome">-</dd>
                </div>
              </dl>
            </section>

            <section class="detail-section">
              <span class="eyebrow">Informações oficiais</span>
              <h2>Contato</h2>
              <dl class="contact-list">
                <div>
                  <dt><i class="bi bi-telephone"></i> Telefone</dt>
                  <dd id="prefeituraTelefoneInfo">-</dd>
                </div>
                <div>
                  <dt><i class="bi bi-envelope"></i> E-mail</dt>
                  <dd id="prefeituraEmailInfo">-</dd>
                </div>
              </dl>

              <div class="section-divider"></div>

              <h2>Endereço</h2>
              <p id="prefeituraEndereco">-</p>
            </section>
          </div>
        </div>
      </section>
    </main>

    <site-footer></site-footer>
  </div>
</body>
</html>
